<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToNow Garden Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <div onclick="toggleLang()"><i class="fa fa-globe"></i> <span id="currentLang">EN</span></div>
        <div id="ton-connect-btn"></div>
        <div id="adminIcon" style="display:none" onclick="showPage('adminPanel')"><i class="fa fa-cog"></i></div>
    </div>

    <header class="hero">
        <div class="main-balance"><span id="tonBalance">0.00</span> <small>TON</small></div>
        <div style="color:var(--accent); font-weight:bold;"><i class="fa fa-bolt"></i> <span id="ptsBalance">0</span> Points</div>
    </header>

    <main>
        <div id="homePage" class="page active">
            <h4 id="txtActive">Active Tasks</h4>
            <div id="taskList"></div>
        </div>

        <div id="orderPage" class="page">
            <div class="card">
                <h4>Post Advertisement</h4>
                <div id="freeTag" style="color:green; font-weight:bold; display:none;">🎉 1 Free Task Available!</div>
                <input type="text" id="taskTitle" placeholder="Channel Name">
                <input type="text" id="taskLink" placeholder="t.me/yourlink">
                <input type="number" id="taskTon" placeholder="TON Amount (e.g. 1 or 20)">
                <p style="font-size:12px;">1 TON = 10,000 Points (50 Users)</p>
                <button class="btn-main" onclick="processPost()">Pay & Launch</button>
            </div>
        </div>

        <div id="walletPage" class="page">
            <div class="card">
                <h4>Withdraw Earnings</h4>
                <p>Min Withdraw: 10,000 Points</p>
                <input type="text" id="wAddr" placeholder="Connect Wallet First" readonly>
                <input type="number" id="wAmount" placeholder="Amount in Points">
                <button class="btn-main" onclick="handleWithdraw()">Request Withdraw</button>
            </div>
        </div>
    </main>

    <nav class="bottom-menu">
        <div class="nav-item active" onclick="showPage('homePage', this)"><i class="fa fa-tasks"></i><br>Tasks</div>
        <div class="nav-item" onclick="showPage('orderPage', this)"><i class="fa fa-bullhorn"></i><br>Post</div>
        <div class="nav-item" onclick="showPage('walletPage', this)"><i class="fa fa-wallet"></i><br>Wallet</div>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
