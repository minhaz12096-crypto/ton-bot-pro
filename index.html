<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToNow Premium Ads - Garden Theme</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <div class="lang-selector" onclick="toggleLang()">
            <i class="fa fa-globe"></i> <span id="currentLang">EN</span>
        </div>
        <div id="ton-connect-btn"></div> </div>

    <header class="hero">
        <div id="labelBalance" class="ad-label">Advertising Balance</div>
        <div class="main-balance"><span id="tonBalance">0.00</span> <small>TON</small></div>
        <div class="pts-pill" onclick="showAd()"><i class="fa fa-bolt"></i> <span id="ptsBalance">0</span> PTS</div>
        <button id="btnOrderToggle" class="btn-primary" onclick="showPage('orderPage')">Post New Ad</button>
    </header>

    <main>
        <div id="homePage" class="page active">
            <h4 id="labelActiveTasks">Active Campaigns</h4>
            <div id="taskList"></div>
        </div>

        <div id="orderPage" class="page">
            <div class="card">
                <h4 id="labelCreateAd">Create Promotion</h4>
                <input type="text" id="tTitle" placeholder="Channel Name">
                <input type="text" id="tLink" placeholder="t.me/yourlink">
                <p id="labelPriceInfo">Price: 1.0 TON = 10,000 Points</p>
                <button id="btnLaunch" class="btn-success" onclick="launchAd()">Pay & Launch</button>
            </div>
        </div>
    </main>

    <nav class="bottom-menu">
        <div id="menuHome" class="nav-item active" onclick="showPage('homePage', this)"><i class="fa fa-home"></i><br>Home</div>
        <div id="menuMarket" class="nav-item" onclick="showPage('orderPage', this)"><i class="fa fa-bullhorn"></i><br>Market</div>
        <div id="adminTab" class="nav-item" style="display:none;" onclick="location.href='admin.html'"><i class="fa fa-user-shield"></i><br>Admin</div>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
